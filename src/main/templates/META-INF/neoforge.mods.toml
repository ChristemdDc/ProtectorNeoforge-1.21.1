modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "protectormod.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# AnimaSlime: motor de animacion para los modelos de las protecciones.
# OBLIGATORIA, pero viaja EMBEBIDA (JarJar) dentro de este jar, asi que el usuario final
# no tiene que instalarla aparte. Cargar ANTES que ProtectorMod: el enlace de modelos
# (AnimaSlimeBlockRenderers.bind) ocurre en el constructor de ProtectorMod y necesita que
# las clases del motor ya esten disponibles.
[[dependencies.${mod_id}]]
modId = "animaslime"
type = "required"
versionRange = "${animaslime_version_range}"
ordering = "AFTER"
side = "BOTH"

# Integracion opcional: si Aeronautics Claims esta presente, registramos el
# resolver de clanes como fuente de "party". Cargar despues de aeroclaims.
[[dependencies.${mod_id}]]
modId = "aeroclaims"
type = "optional"
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

# Create (FakePlayers). Opcional.
[[dependencies.${mod_id}]]
modId = "create"
type = "optional"
versionRange = "[0,)"
ordering = "NONE"
side = "BOTH"
